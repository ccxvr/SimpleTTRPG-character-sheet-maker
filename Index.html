<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Simple TTRPG Builder</title>
<style>
body { font-family: Arial; margin:20px; }
.panel { border:1px solid #ccc; padding:15px; margin-bottom:20px; }
.row { display:flex; gap:15px; margin-bottom:10px; }
input, select, textarea { width:100%; padding:5px; }
textarea { min-height:80px; }
.sheet { white-space:pre-wrap; border:1px solid #000; padding:20px; }
@media print {
  body * { visibility:hidden; }
  #printArea, #printArea * { visibility:visible; }
  #printArea { position:absolute; left:0; top:0; width:100%; }
}
</style>
</head>
<body>

<h1>Simple TTRPG Character Builder</h1>

<div class="panel">
  <h3>Character</h3>
  <div class="row">
    <div><label>Name</label><input id="name"></div>
    <div><label>Species</label><select id="species"></select></div>
  </div>
  <div class="row">
    <div><label>Might</label><input id="might" type="number"></div>
    <div><label>Agility</label><input id="agility" type="number"></div>
    <div><label>Wit</label><input id="wit" type="number"></div>
    <div><label>Will</label><input id="will" type="number"></div>
    <div><label>Toughness</label><input id="toughness" type="number"></div>
  </div>
</div>

<div class="panel">
  <h3>Traits</h3>
  <select id="traitSelect"></select>
  <button onclick="addTrait()">Add Trait</button>
  <div id="traitList"></div>
</div>

<div class="panel">
  <h3>Equipment</h3>
  <select id="weaponSelect"></select>
  <button onclick="addWeapon()">Add Weapon</button>
  <div id="weaponList"></div>
</div>

<div class="panel">
  <h3>Spell Builder</h3>
  <input id="spellName" placeholder="Spell Name">
  <select id="spellVector"></select>
  <select id="spellEffects" multiple size="4"></select>
  <textarea id="spellText" placeholder="Spell description"></textarea>
  <button onclick="addSpell()">Add Spell</button>
  <div id="spellList"></div>
</div>

<button onclick="window.print()">Print / Save as PDF</button>

<hr>

<h2>Character Sheet Preview</h2>
<div id="printArea" class="sheet"></div>

<script src="app.js"></script>
</body>
</html>
